le="stroke:#A80036;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="230.5" x2="500.5" y1="682.3125" y2="682.3125"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="252" x="242.5" y="677.4824">6b. raise UserError("Nothing to invoice")</text><polygon fill="#A80036" points="68.5,706.2813,58.5,710.2813,68.5,714.2813,64.5,710.2813" style="stroke:#A80036;stroke-width:1.0;"/><line style="stroke:#A80036;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="62.5" x2="224.5" y1="710.2813" y2="710.2813"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="107" x="74.5" y="705.4512">7b. Mostrar error</text><rect fill="#DDDDDD" height="65.875" rx="5" ry="5" style="stroke:#000000;stroke-width:1.0;" width="264" x="1000.5" y="820.25"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="144" x="1006.5" y="836.3887">Proyecto: SAP-TFI-2026</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="120" x="1006.5" y="850.3574">Agente: saptfi2026</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="124" x="1006.5" y="864.3262">Metodologia: ICONIX</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="252" x="1006.5" y="878.2949">Fuente: Ingenieria inversa de Odoo 19.0</text><!--MD5=[7010743e307214efbed681ec3e40414c]
@startuml D-SEC-FAC-001 — Diagrama de Secuencia: Crear Factura

title SAP-TFI-2026 — Diagrama de Secuencia - Crear Factura desde Pedido (CU-FAC-001)

skinparam shadowing false
skinparam handwritten false
skinparam defaultFontName Arial
skinparam defaultFontSize 12
skinparam linetype ortho
skinparam backgroundColor white

actor "Facturador" as F
participant "Boton" as Btn
participant "SaleOrder\n(_create_invoices)" as SO
participant "AccountMove" as AM
database "PostgreSQL" as DB

F -> Btn : 1. Click "Crear Factura"
Btn -> SO : 2. _create_invoices()
activate SO

SO -> DB : 3. SELECT sale.order (state='sale')
DB - -> SO : 4. order

SO -> SO : 5. Verifica invoice_status

alt Hay lineas a facturar
    SO -> DB : 6a. SELECT sale.order.line (qty to invoice)
    DB - -> SO : 7a. lines
    
    SO -> SO : 8a. _prepare_invoice() construye vals
    activate AM
    
    AM -> DB : 9a. INSERT account.move (move_type='out_invoice', state='draft')
    DB - -> AM : 10a. id
    
    loop Por cada linea
        AM -> DB : 11a. INSERT account.move.line
        DB - -> AM : 12a. id
    end
    
    AM -> DB : 13a. UPDATE sale.order SET invoice_ids=...
    AM -> DB : 14a. UPDATE sale.order SET invoice_status=...
    deactivate AM
    
    SO - -> Btn : 15a. Factura creada
    Btn - -> F : 16a. Mostrar factura
else Nada a facturar
    SO - -> Btn : 6b. raise UserError("Nothing to invoice")
    Btn - -> F : 7b. Mostrar error
end
deactivate SO

legend right
Proyecto: SAP-TFI-2026
Agente: saptfi2026
Metodologia: ICONIX
Fuente: Ingenieria inversa de Odoo 19.0
endlegend

@enduml


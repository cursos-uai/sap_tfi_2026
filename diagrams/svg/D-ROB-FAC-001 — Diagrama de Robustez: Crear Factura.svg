.5,621.3438,75.5,625.3438,71.5,621.3438" style="stroke:#A80036;stroke-width:1.0;"/><line style="stroke:#A80036;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="69.5" x2="384.5" y1="621.3438" y2="621.3438"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="164" x="81.5" y="616.5137">14. Resultado (OK o error)</text><rect fill="#DDDDDD" height="65.875" rx="5" ry="5" style="stroke:#000000;stroke-width:1.0;" width="264" x="809" y="738.2813"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="144" x="815" y="754.4199">Proyecto: SAP-TFI-2026</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="120" x="815" y="768.3887">Agente: saptfi2026</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="124" x="815" y="782.3574">Metodologia: ICONIX</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="252" x="815" y="796.3262">Fuente: Ingenieria inversa de Odoo 19.0</text><!--MD5=[cd5464ab31f0ed8707a4f3a764f16cb5]
@startuml D-ROB-FAC-001 — Diagrama de Robustez: Crear Factura

title SAP-TFI-2026 — Diagrama de Robustez - Crear Factura desde Pedido (CU-FAC-001)

skinparam shadowing false
skinparam handwritten false
skinparam defaultFontName Arial
skinparam defaultFontSize 12
skinparam linetype ortho
skinparam backgroundColor white

actor "Facturador\n(o Vendedor)" as A

boundary "Boton Crear Factura\n(en sale.order)" as B_Btn

control "SaleOrder\n(_create_invoices)" as C_Inv

entity "sale.order\n(state=sale)" as E_SO
entity "sale.order.line" as E_Line
entity "account.move\n(draft)" as E_AM
entity "account.move.line" as E_AML
entity "account.tax" as E_Tax

A - -> B_Btn : 1. Click "Crear Factura"
B_Btn - -> C_Inv : 2. _create_invoices()
C_Inv - -> E_SO : 3. Lee pedido
E_SO - -> C_Inv : 4. order, lines, taxes

C_Inv - -> E_SO : 5. Verifica invoice_status
alt Si hay lineas a facturar
    C_Inv - -> E_Line : 6a. Lee lineas pendientes
    C_Inv - -> E_Tax : 7a. Aplica impuestos
    
    loop Por cada linea
        C_Inv - -> E_AML : 8a. Crea account.move.line
        E_AML - -> C_Inv : 9a. OK
    end
    
    C_Inv - -> E_AM : 10a. Crea account.move (draft)
    E_AM - -> C_Inv : 11a. id, name (sequence)
    
    C_Inv - -> E_SO : 12a. Asocia invoice_ids
    C_Inv - -> E_SO : 13a. Actualiza invoice_status
else Si nada que facturar
    C_Inv - -> A : 6b. Mensaje "Nothing to invoice"
end

C_Inv - -> A : 14. Resultado (OK o error)

legend right
Proyecto: SAP-TFI-2026
Agente: saptfi2026
Metodologia: ICONIX
Fuente: Ingenieria inversa de Odoo 19.0
endlegend

@enduml

